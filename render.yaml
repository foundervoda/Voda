services:
  - type: web
    name: voda-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npx prisma generate
    startCommand: node src/index.js
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
